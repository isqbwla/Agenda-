<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f7fb;
  --card: #ffffff;
  --soft: #f0f1f6;
  --border: #e6e6ef;
  --text: #2d2d2d;

  --passeio: #a8d8ff;
  --comida: #ffc9c9;
  --descanso: #c8f7dc;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 20px 10px;
  font-weight: 500;
  font-size: 20px;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 30px;
  max-width: 1200px;
  margin: auto;
  padding: 20px 30px 50px;
  align-items: flex-start;
}

/* GAVETA */
.gaveta {
  width: 260px;
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  border: 1px solid var(--border);

  position: sticky;
  top: 20px;

  max-height: calc(100vh - 40px);
  overflow-y: auto;
}

/* INPUTS */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--soft);
  font-family: inherit;
}

button {
  background: #2d2d2d;
  color: white;
  cursor: pointer;
}

/* LISTA */
#lista {
  margin-top: 10px;
}

/* BLOCOS */
.bloco {
  padding: 10px 12px;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 13px;
  cursor: grab;
  position: relative;
  transition: 0.2s;
}

.bloco:hover {
  transform: scale(1.02);
}

.bloco:active {
  cursor: grabbing;
}

.passeio { background: var(--passeio); }
.comida { background: var(--comida); }
.descanso { background: var(--descanso); }

/* REMOVER */
.remover {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.6;
}

/* GRADE */
.grade {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* DIA */
.dia {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  border: 1px solid var(--border);
}

/* SLOT */
.slot {
  background: var(--soft);
  border: 1px dashed var(--border);
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  min-height: 60px;
  transition: 0.2s;
  font-size: 13px;
}

.slot.dragover {
  background: #eef3ff;
  border-color: #9bbcff;
}

/* EXPORTAR */
.exportar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2d2d2d;
  color: white;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 13px;
}

/* RESPONSIVO */
@media(max-width: 900px){
  .container {
    flex-direction: column;
  }

  .gaveta {
    position: relative;
    max-height: none;
    width: 100%;
  }
}
</style>
</head>

<body>

<header>planner semanal</header>

<div class="container">

  <div class="gaveta">
    <input type="text" id="nome" placeholder="nome">

    <select id="tipo">
      <option value="passeio">passeio</option>
      <option value="comida">comida</option>
      <option value="descanso">descanso</option>
    </select>

    <button id="addBtn">adicionar</button>

    <div id="lista"></div>
  </div>

  <div class="grade" id="grade"></div>

</div>

<div class="exportar" id="exportBtn">exportar</div>

<script>
const dias = ["sábado","domingo","segunda","terça","quarta"];
const horarios = ["08h","10h","12h","16h","noite"];

const grade = document.getElementById("grade");

// CRIAR GRADE
dias.forEach(dia => {
  const d = document.createElement("div");
  d.className = "dia";

  const h = document.createElement("div");
  h.textContent = dia;
  h.style.fontWeight = "500";
  d.appendChild(h);

  horarios.forEach(horario => {
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.dataset.key = dia+"_"+horario;
    slot.textContent = horario;

    slot.ondragover = e => e.preventDefault();

    slot.ondragenter = () => slot.classList.add("dragover");
    slot.ondragleave = () => slot.classList.remove("dragover");

    slot.ondrop = e => {
      e.preventDefault();
      slot.classList.remove("dragover");

      const id = e.dataTransfer.getData("text");
      const el = document.getElementById(id);
      slot.appendChild(el);

      salvar();
    };

    d.appendChild(slot);
  });

  grade.appendChild(d);
});

// BLOCO
function criarBloco(nome, tipo, id){
  const b = document.createElement("div");
  b.className = "bloco "+tipo;
  b.textContent = nome;
  b.id = id;
  b.draggable = true;

  b.ondragstart = e => {
    e.dataTransfer.setData("text", id);
  };

  b.ondblclick = () => {
    const novo = prompt("editar:", b.textContent);
    if(novo){
      b.childNodes[0].nodeValue = novo;
      salvar();
    }
  };

  const x = document.createElement("span");
  x.textContent = "x";
  x.className = "remover";
  x.onclick = () => {
    if(confirm("remover?")){
      b.remove();
      salvar();
    }
  };

  b.appendChild(x);
  return b;
}

// ADD
document.getElementById("addBtn").addEventListener("click", () => {
  const nome = document.getElementById("nome").value;
  const tipo = document.getElementById("tipo").value;

  if(!nome) return;

  const id = "id_"+Date.now();
  const bloco = criarBloco(nome, tipo, id);

  document.getElementById("lista").appendChild(bloco);
  document.getElementById("nome").value = "";

  salvar();
});

// SALVAR
function salvar(){
  const dados = [];

  document.querySelectorAll(".bloco").forEach(b => {
    const parent = b.parentElement.dataset?.key || "gaveta";

    dados.push({
      id: b.id,
      nome: b.childNodes[0].nodeValue,
      tipo: b.classList[1],
      local: parent
    });
  });

  localStorage.setItem("planner", JSON.stringify(dados));
}

// CARREGAR
function carregar(){
  const dados = JSON.parse(localStorage.getItem("planner")) || [];

  dados.forEach(d => {
    const bloco = criarBloco(d.nome, d.tipo, d.id);

    if(d.local === "gaveta"){
      document.getElementById("lista").appendChild(bloco);
    } else {
      const slot = document.querySelector(`[data-key="${d.local}"]`);
      if(slot) slot.appendChild(bloco);
    }
  });
}

carregar();

// EXPORTAR
document.getElementById("exportBtn").addEventListener("click", () => {
  html2canvas(document.getElementById("grade")).then(canvas => {
    const link = document.createElement("a");
    link.download = "planner.png";
    link.href = canvas.toDataURL();
    link.click();
  });
});
</script>

</body>
</html>
