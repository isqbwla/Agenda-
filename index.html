<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b12;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.1);

  --neon-pink: #ff4ecd;
  --neon-blue: #4ecbff;
  --text: #eaeaf0;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111122, #050507);
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  font-size: 18px;
  letter-spacing: 1px;
  color: var(--neon-pink);
}

/* LAYOUT */
.container {
  display: flex;
  gap: 30px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  align-items: flex-start;
}

/* GAVETA */
.gaveta {
  width: 260px;
  padding: 20px;
  border-radius: 20px;

  background: var(--card);
  backdrop-filter: blur(10px);

  border: 1px solid var(--border);

  position: sticky;
  top: 20px;

  box-shadow: 0 0 20px rgba(255,78,205,0.15);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;

  background: rgba(255,255,255,0.05);
  border: 1px solid transparent;

  color: var(--text);
  outline: none;
}

/* FIX BUG INPUT */
input:focus, select:focus {
  border: 1px solid var(--neon-pink);
  box-shadow: 0 0 10px var(--neon-pink);
}

/* BOTAO */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 14px;

  background: linear-gradient(135deg, #ff4ecd, #4ecbff);
  border: none;
  color: white;

  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(255,78,205,0.6);
}

/* BLOCOS */
.bloco {
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 13px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);

  cursor: grab;
  position: relative;

  transition: 0.2s;
}

.bloco:hover {
  box-shadow: 0 0 10px var(--neon-blue);
}

.bloco:active {
  cursor: grabbing;
}

/* REMOVER */
.remover {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 12px;
  opacity: 0.6;
  cursor: pointer;
}

/* GRADE */
.grade {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* DIA */
.dia {
  padding: 18px;
  border-radius: 20px;

  background: var(--card);
  backdrop-filter: blur(10px);

  border: 1px solid var(--border);

  box-shadow: 0 0 15px rgba(78,203,255,0.1);
}

/* SLOT */
.slot {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;

  border: 1px dashed rgba(255,255,255,0.15);
  min-height: 60px;

  transition: 0.2s;
}

.slot.dragover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 10px var(--neon-blue);
}

/* EXPORTAR */
.exportar {
  position: fixed;
  bottom: 20px;
  right: 20px;

  padding: 12px 16px;
  border-radius: 14px;

  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);

  cursor: pointer;
}

/* MOBILE */
@media(max-width: 900px){
  .container {
    flex-direction: column;
  }

  .gaveta {
    position: relative;
    width: 100%;
  }
}
</style>
</head>

<body>

<header>planner</header>

<div class="container">

  <div class="gaveta">
    <input type="text" id="nome" placeholder="nome">
    
    <select id="tipo">
      <option value="passeio">passeio</option>
      <option value="comida">comida</option>
      <option value="descanso">descanso</option>
    </select>

    <button id="addBtn">adicionar</button>

    <div id="lista"></div>
  </div>

  <div class="grade" id="grade"></div>

</div>

<div class="exportar" id="exportBtn">exportar</div>

<script>
const dias = ["sábado","domingo","segunda","terça","quarta"];
const horarios = ["08h","10h","12h","16h","noite"];

const grade = document.getElementById("grade");

dias.forEach(dia => {
  const d = document.createElement("div");
  d.className = "dia";

  const h = document.createElement("div");
  h.textContent = dia;
  h.style.color = "#ff4ecd";
  d.appendChild(h);

  horarios.forEach(horario => {
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.dataset.key = dia+"_"+horario;
    slot.textContent = horario;

    slot.ondragover = e => e.preventDefault();

    slot.ondragenter = () => slot.classList.add("dragover");
    slot.ondragleave = () => slot.classList.remove("dragover");

    slot.ondrop = e => {
      e.preventDefault();
      slot.classList.remove("dragover");

      const id = e.dataTransfer.getData("text");
      const el = document.getElementById(id);
      slot.appendChild(el);

      salvar();
    };

    d.appendChild(slot);
  });

  grade.appendChild(d);
});

function criarBloco(nome, tipo, id){
  const b = document.createElement("div");
  b.className = "bloco";
  b.textContent = nome;
  b.id = id;
  b.draggable = true;

  b.ondragstart = e => {
    e.dataTransfer.setData("text", id);
  };

  const x = document.createElement("span");
  x.textContent = "x";
  x.className = "remover";

  x.onclick = () => {
    if(confirm("remover?")){
      b.remove();
      salvar();
    }
  };

  b.appendChild(x);
  return b;
}

document.getElementById("addBtn").addEventListener("click", () => {
  const nome = document.getElementById("nome").value;

  if(!nome) return;

  const id = "id_"+Date.now();
  const bloco = criarBloco(nome, "", id);

  document.getElementById("lista").appendChild(bloco);
  document.getElementById("nome").value = "";

  salvar();
});

function salvar(){
  const dados = [];

  document.querySelectorAll(".bloco").forEach(b => {
    const parent = b.parentElement.dataset?.key || "gaveta";

    dados.push({
      id: b.id,
      nome: b.childNodes[0].nodeValue,
      local: parent
    });
  });

  localStorage.setItem("planner", JSON.stringify(dados));
}

function carregar(){
  const dados = JSON.parse(localStorage.getItem("planner")) || [];

  dados.forEach(d => {
    const bloco = criarBloco(d.nome, "", d.id);

    if(d.local === "gaveta"){
      document.getElementById("lista").appendChild(bloco);
    } else {
      const slot = document.querySelector(`[data-key="${d.local}"]`);
      if(slot) slot.appendChild(bloco);
    }
  });
}

carregar();

document.getElementById("exportBtn").addEventListener("click", () => {
  html2canvas(document.getElementById("grade")).then(canvas => {
    const link = document.createElement("a");
    link.download = "planner.png";
    link.href = canvas.toDataURL();
    link.click();
  });
});
</script>

</body>
</html>
