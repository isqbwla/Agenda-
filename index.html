<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

:root {
  --bg: #0b0b12;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.1);
  --text: #eaeaf0;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111122, #050507);
  color: var(--text);
}

/* layout */
.container {
  display: flex;
  gap: 30px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  align-items: flex-start;
}

/* gaveta */
.gaveta {
  width: 280px;
  padding: 20px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  position: sticky;
  top: 20px;
}

/* input */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid transparent;
  color: var(--text);
}

input:focus {
  border: 1px solid #ff4ecd;
  box-shadow: 0 0 10px #ff4ecd;
  outline: none;
}

/* PALETA */
.paleta {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin: 10px 0;
}

.cor {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  border: 2px solid transparent;
}

.cor:hover {
  transform: scale(1.15);
}

.cor.selected {
  border: 2px solid white;
  box-shadow: 0 0 10px white;
}

/* botão */
button {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff4ecd, #4ecbff);
  border: none;
  color: white;
  cursor: pointer;
}

/* bloco */
.bloco {
  padding: 10px;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 13px;
  cursor: grab;
  position: relative;
  color: #000;
}

/* remover */
.remover {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 12px;
  cursor: pointer;
}

/* grade */
.grade {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* dia */
.dia {
  padding: 20px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
}

/* slot */
.slot {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px dashed rgba(255,255,255,0.2);
  min-height: 60px;
}

/* export */
.exportar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px;
  background: #222;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="gaveta">
    <input type="text" id="nome" placeholder="nome">

    <!-- PALETA -->
    <div class="paleta" id="paleta"></div>

    <button id="addBtn">adicionar</button>

    <div id="lista"></div>
  </div>

  <div class="grade" id="grade"></div>

</div>

<div class="exportar" id="pdfBtn">exportar pdf</div>

<script>
const cores = [
"#cdb4db","#ffc8dd","#ffafcc","#bde0fe","#a2d2ff",
"#ffadad","#ffd6a5","#fdffb6","#caffbf","#9bf6ff",
"#a0c4ff","#bdb2ff","#ffc6ff","#fffffc","#d0f4de",
"#f1c0e8","#cfbaf0","#a3c4f3","#90dbf4","#8eecf5"
];

let corSelecionada = cores[0];

// render paleta
const paleta = document.getElementById("paleta");

cores.forEach(c => {
  const el = document.createElement("div");
  el.className = "cor";
  el.style.background = c;

  el.onclick = () => {
    document.querySelectorAll(".cor").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    corSelecionada = c;
  };

  paleta.appendChild(el);
});

// selecionar primeira
paleta.firstChild.classList.add("selected");

// grade
const dias = ["sábado","domingo","segunda","terça","quarta"];
const horarios = ["08h","10h","12h","16h","noite"];
const grade = document.getElementById("grade");

dias.forEach(dia => {
  const d = document.createElement("div");
  d.className = "dia";

  d.innerHTML = "<strong>"+dia+"</strong>";

  horarios.forEach(h => {
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.dataset.key = dia+"_"+h;
    slot.textContent = h;

    slot.ondragover = e => e.preventDefault();

    slot.ondrop = e => {
      e.preventDefault();
      const id = e.dataTransfer.getData("text");
      slot.appendChild(document.getElementById(id));
      salvar();
    };

    d.appendChild(slot);
  });

  grade.appendChild(d);
});

// bloco
function criarBloco(nome, cor, id){
  const b = document.createElement("div");
  b.className = "bloco";
  b.textContent = nome;
  b.style.background = cor;
  b.dataset.cor = cor;
  b.id = id;
  b.draggable = true;

  b.ondragstart = e => e.dataTransfer.setData("text", id);

  const x = document.createElement("span");
  x.textContent = "x";
  x.className = "remover";
  x.onclick = () => {
    b.remove();
    salvar();
  };

  b.appendChild(x);
  return b;
}

// add
document.getElementById("addBtn").onclick = () => {
  const nome = document.getElementById("nome").value;
  if(!nome) return;

  const bloco = criarBloco(nome, corSelecionada, "id_"+Date.now());
  document.getElementById("lista").appendChild(bloco);
  document.getElementById("nome").value = "";

  salvar();
};

// salvar
function salvar(){
  const dados = [];
  document.querySelectorAll(".bloco").forEach(b => {
    dados.push({
      id: b.id,
      nome: b.childNodes[0].nodeValue,
      cor: b.dataset.cor,
      local: b.parentElement.dataset?.key || "gaveta"
    });
  });
  localStorage.setItem("planner", JSON.stringify(dados));
}

// carregar
function carregar(){
  const dados = JSON.parse(localStorage.getItem("planner")) || [];

  dados.forEach(d => {
    const bloco = criarBloco(d.nome, d.cor, d.id);

    if(d.local === "gaveta"){
      document.getElementById("lista").appendChild(bloco);
    } else {
      const slot = document.querySelector(`[data-key="${d.local}"]`);
      if(slot) slot.appendChild(bloco);
    }
  });
}

carregar();

// PDF
document.getElementById("pdfBtn").onclick = async () => {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const diasEl = document.querySelectorAll(".dia");

  for(let i = 0; i < diasEl.length; i++){
    const canvas = await html2canvas(diasEl[i]);
    const img = canvas.toDataURL("image/png");

    if(i > 0) pdf.addPage();

    pdf.addImage(img, 'PNG', 10, 10, 180, 0);
  }

  pdf.save("planner.pdf");
};
</script>

</body>
</html>
